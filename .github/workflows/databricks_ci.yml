name: Databricks Medallion CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          pip install pytest
          # If your python files require packages to validate syntax, add them here
          
      - name: Run Unit Tests
        run: |
          # Only runs if the tests directory actually exists
          if [ -d "tests" ]; then
            pytest tests/
          else
            echo "No tests directory found, skipping."
          fi

  deploy-to-databricks:
    runs-on: ubuntu-latest
    needs: python-validation
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: List files for debugging
        run: |
          echo "Current directory: $(pwd)"
          ls -F
          find . -name "databricks.yml"

      # REMOVED "bundle run" TO PREVENT ACCIDENTAL ACCELERATED PIPELINE RUNS
      # The GCS file arrival trigger will now natively manage all executions.
      - name: Bundle Deploy
        run: |
          # Deploys asset configuration updates and refreshes the file arrival listener
          databricks bundle deploy --target default
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}