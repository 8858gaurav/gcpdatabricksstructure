bundle:
  name: databricks-medallion-pipeline

resources:
  jobs:
    JOB_via_GitHUb:
      name: JOB via - GitHUb
      max_concurrent_runs: 1
      timeout_seconds: 7200
      
      trigger:
        file_arrival:
          url: "gs://databricksfolder/raw/" 

      email_notifications:
        on_failure:
          - gauravmishra010@gmail.com
        on_success: 
          - gauravmishra010@gmail.com
            
      tasks:
        - task_key: Execute_Medallion_Notebook
          notebook_task:
            notebook_path: /Workspace/Users/gauravmishra010@gmail.com/gcpdatabricksstructure/medallion-notebook
            source: WORKSPACE
          job_cluster_key: Gaurav_Cluster
          max_retries: 2
          min_retry_interval_millis: 300000 
          retry_on_timeout: true

      job_clusters:
        - job_cluster_key: Gaurav_Cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            # 1. FIXED: Changed from Azure-based Standard_D4s_v3 to native GCP machine type
            node_type_id: n2-standard-4 
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: "singleNode"
              spark.master: "local[*]"
            custom_tags:
              ResourceClass: "SingleNode"
            data_security_mode: SINGLE_USER
            runtime_engine: PHOTON

targets:
  default:
    workspace:
      host: https://8259558609465663.3.gcp.databricks.com